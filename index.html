<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>みんなの日記</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root {
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --primary: #FF8C69;
    --primary-light: #FFD4C4;
    --text: #3D2B1F;
    --text-soft: #9B7B6E;
    --border: #F0DDD4;
    --good: #7EC8A4;
    --normal: #F5C842;
    --bad: #E88080;
    --shadow: 0 2px 12px rgba(61,43,31,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* HEADER */
  .header {
    background: var(--primary);
    padding: 20px 20px 28px;
    text-align: center;
    position: relative;
  }
  .header-date {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .header-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    margin-top: 3px;
  }

  /* WAVE */
  .wave {
    display: block;
    width: 100%;
    height: 24px;
    background: var(--bg);
    margin-top: -1px;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* SCREENS */
  .screen { display: none; padding: 0 16px; }
  .screen.active { display: block; }

  /* MEMBER SELECT */
  .section-label {
    font-size: 11px;
    color: var(--text-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 20px 0 10px;
    font-weight: 500;
  }

  .member-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .member-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 12px 4px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .member-btn .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 auto 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--primary-light);
  }
  .member-btn .name {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
  }
  .member-btn:active {
    transform: scale(0.95);
    border-color: var(--primary);
    background: #FFF0E8;
  }

  /* RECORD CARD */
  .card {
    background: var(--surface);
    border-radius: 20px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  .card-who {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .card-who .av {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .card-who .info .label { font-size: 10px; color: var(--text-soft); }
  .card-who .info .name { font-size: 17px; font-weight: 700; }

  /* DATE ROW */
  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .date-row label { font-size: 12px; color: var(--text-soft); font-weight: 500; min-width: 36px; }
  .date-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .date-input:focus { border-color: var(--primary); }

  /* TOGGLE PILLS */
  .q-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
  }
  .q-label span { font-size: 16px; margin-right: 4px; }

  .pill-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .pill {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 40px;
    padding: 11px 6px;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    color: var(--text-soft);
    transition: all 0.16s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .pill .icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .pill:active { transform: scale(0.96); }

  .pill.selected-out   { border-color: #6BB5D6; background: #E8F6FF; color: #2E7FA0; }
  .pill.selected-stay  { border-color: #B5A4D6; background: #F0EBFF; color: #5E4EA0; }
  .pill.selected-good  { border-color: var(--good); background: #E8F7F0; color: #3D9B6E; }
  .pill.selected-normal{ border-color: var(--normal); background: #FFFBE8; color: #B09020; }
  .pill.selected-bad   { border-color: var(--bad); background: #FFEDED; color: #C04040; }

  /* NOTE */
  .note-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    resize: none;
    outline: none;
    min-height: 70px;
  }
  .note-input:focus { border-color: var(--primary); }

  /* SUBMIT */
  .btn-submit {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: 0.05em;
    box-shadow: 0 4px 14px rgba(255,140,105,0.35);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn-submit:active { transform: scale(0.97); box-shadow: 0 2px 6px rgba(255,140,105,0.2); }

  .btn-back {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--text-soft);
    cursor: pointer;
    padding: 4px 0;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
  }

  /* SUCCESS */
  .success-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .success-icon { font-size: 64px; margin-bottom: 12px; }
  .success-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .success-msg { font-size: 14px; color: var(--text-soft); margin-bottom: 32px; }
  .btn-another {
    width: 100%;
    background: var(--primary-light);
    color: var(--primary);
    border: none;
    border-radius: 16px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-history {
    width: 100%;
    background: var(--surface);
    color: var(--text-soft);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* HISTORY */
  .history-item {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .h-av {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .h-info { flex: 1; }
  .h-name { font-size: 13px; font-weight: 700; }
  .h-date { font-size: 11px; color: var(--text-soft); }
  .h-tags { display: flex; gap: 5px; margin-top: 4px; flex-wrap: wrap; }
  .h-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-out    { background: #E8F6FF; color: #2E7FA0; }
  .tag-stay   { background: #F0EBFF; color: #5E4EA0; }
  .tag-good   { background: #E8F7F0; color: #3D9B6E; }
  .tag-normal { background: #FFFBE8; color: #B09020; }
  .tag-bad    { background: #FFEDED; color: #C04040; }
  .h-note { font-size: 12px; color: var(--text-soft); margin-top: 3px; }

  .empty-msg {
    text-align: center;
    color: var(--text-soft);
    font-size: 14px;
    padding: 40px 0;
  }

  /* DELETE BUTTONS */
  .btn-delete-one {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-soft);
    padding: 4px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.5;
  }
  .btn-delete-one:active { opacity: 1; }

  .delete-toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .btn-select-all {
    flex: 1;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-select-all:active { background: var(--bg); }

  .btn-clear-selected {
    flex: 1;
    background: none;
    border: 1.5px solid var(--bad);
    border-radius: 12px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    color: var(--bad);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-clear-selected.active {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-clear-selected.active:active { background: #FFEDED; }

  .history-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    accent-color: var(--bad);
    cursor: pointer;
  }
  .history-item.selected {
    border: 1.5px solid var(--bad);
    background: #FFF5F5;
  }

  /* GAS NOTICE */
  .gas-notice {
    background: #FFF8E1;
    border: 1px solid #FFD54F;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    color: #8B6914;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .gas-notice strong { display: block; margin-bottom: 2px; }
  /* LOTTIE */
  #lottie-container {
    width: 100%;
    height: 160px;
    overflow: hidden;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-date" id="headerDate"></div>
  <div class="header-title">みんなの日記 🏠</div>
  <div class="header-subtitle">今日もいちにちおつかれさま</div>
</div>

<!-- SCREEN 1: メンバー選択 -->
<div class="screen active" id="screen-select">
  <div id="lottie-container"></div>
  <p class="section-label">だれのきろく？</p>

  <div class="member-grid">
    <button class="member-btn" onclick="selectMember('パパ','👨')">
      <div class="avatar">👨</div>
      <div class="name">パパ</div>
    </button>
    <button class="member-btn" onclick="selectMember('あんな','👧')">
      <div class="avatar">👧</div>
      <div class="name">あんな</div>
    </button>
    <button class="member-btn" onclick="selectMember('まりな','🌸')">
      <div class="avatar">🌸</div>
      <div class="name">まりな</div>
    </button>
    <button class="member-btn" onclick="selectMember('はんな','🐥')">
      <div class="avatar">🐥</div>
      <div class="name">はんな</div>
    </button>
    <button class="member-btn" onclick="selectMember('ママ','👩')">
      <div class="avatar">👩</div>
      <div class="name">ママ</div>
    </button>
  </div>

  <!-- 履歴ボタン -->
  <p class="section-label" style="margin-top:28px">きろくをみる</p>
  <button class="btn-history" onclick="showScreen('screen-history')" style="border-radius:14px;">📋 これまでのきろく</button>
</div>

<!-- SCREEN 2: 記録入力 -->
<div class="screen" id="screen-record">
  <button class="btn-back" onclick="showScreen('screen-select')">← もどる</button>

  <div class="card">
    <div class="card-who">
      <div class="av" id="record-av"></div>
      <div class="info">
        <div class="label">きろくする人</div>
        <div class="name" id="record-name"></div>
      </div>
    </div>

    <!-- 日付 -->
    <div class="date-row">
      <label>📅 日付</label>
      <input type="date" class="date-input" id="record-date">
    </div>

    <!-- 外出 -->
    <div class="q-label"><span>🚪</span>今日は外に出た？</div>
    <div class="pill-row">
      <button class="pill" id="pill-out" onclick="selectActivity('out')">
        <span class="icon">🌤️</span>外出した
      </button>
      <button class="pill" id="pill-stay" onclick="selectActivity('stay')">
        <span class="icon">🏠</span>おうちにいた
      </button>
    </div>

    <!-- メンタル -->
    <div class="q-label"><span>💭</span>きもちはどう？</div>
    <div class="pill-row">
      <button class="pill" id="pill-good" onclick="selectMental('good')">
        <span class="icon">😊</span>よかった
      </button>
      <button class="pill" id="pill-normal" onclick="selectMental('normal')">
        <span class="icon">😐</span>ふつう
      </button>
      <button class="pill" id="pill-bad" onclick="selectMental('bad')">
        <span class="icon">😔</span>よくなかった
      </button>
    </div>

    <!-- メモ -->
    <div class="q-label"><span>📝</span>メモ（なくてもOK）</div>
    <textarea class="note-input" id="record-note" placeholder="今日あったこと、ひとことメモ…"></textarea>
  </div>

  <button class="btn-submit" onclick="submitRecord()">きろくする ✓</button>
</div>

<!-- SCREEN 3: 完了 -->
<div class="screen" id="screen-done">
  <div class="success-screen">
    <div class="success-icon">🌟</div>
    <div class="success-name" id="done-name"></div>
    <div class="success-msg" id="done-msg"></div>
    <button class="btn-another" onclick="showScreen('screen-select')">別の人のきろくをつける</button>
    <button class="btn-history" onclick="showScreen('screen-history')">きろくをみる</button>
  </div>
</div>

<!-- SCREEN 4: 履歴 -->
<div class="screen" id="screen-history">
  <button class="btn-back" onclick="showScreen('screen-select')">← もどる</button>
  <p class="section-label">これまでのきろく</p>

  <div class="delete-toolbar">
    <button class="btn-select-all" id="btn-select-all" onclick="toggleSelectAll()">☑️ 全て選択</button>
    <button class="btn-clear-selected" id="btn-clear-selected" onclick="clearSelected()">🗑️ 消去</button>
  </div>

  <div id="history-list"></div>
</div>

<script>
  // Lottie
  lottie.loadAnimation({
    container: document.getElementById('lottie-container'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: '_0101J_S_02.json'
  });

  // State
  let currentMember = { name: '', avatar: '' };
  let selectedActivity = '';
  let selectedMental = '';
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwXbAPqjIJRtk7ZPClQup3ivmHRKd3f9m-1mI396A6JpY9KQ8Sc7kvIoMVL6Ro98sJbjQ/exec';

  // Init date
  const today = new Date();
  document.getElementById('headerDate').textContent =
    today.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

  function todayStr() {
    return today.toISOString().split('T')[0];
  }

  // Screen switch
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
    if (id === 'screen-history') renderHistory();
  }

  // Member select
  function selectMember(name, avatar) {
    currentMember = { name, avatar };
    selectedActivity = '';
    selectedMental = '';
    document.getElementById('record-name').textContent = name;
    document.getElementById('record-av').textContent = avatar;
    document.getElementById('record-date').value = todayStr();
    document.getElementById('record-note').value = '';
    ['pill-out','pill-stay','pill-good','pill-normal','pill-bad'].forEach(id => {
      document.getElementById(id).className = 'pill';
    });
    showScreen('screen-record');
  }

  // Activity
  function selectActivity(val) {
    selectedActivity = val;
    document.getElementById('pill-out').className = 'pill' + (val === 'out' ? ' selected-out' : '');
    document.getElementById('pill-stay').className = 'pill' + (val === 'stay' ? ' selected-stay' : '');
  }

  // Mental
  function selectMental(val) {
    selectedMental = val;
    document.getElementById('pill-good').className = 'pill' + (val === 'good' ? ' selected-good' : '');
    document.getElementById('pill-normal').className = 'pill' + (val === 'normal' ? ' selected-normal' : '');
    document.getElementById('pill-bad').className = 'pill' + (val === 'bad' ? ' selected-bad' : '');
  }

  // Submit
  async function submitRecord() {
    if (!selectedActivity) { alert('外出したかどうかを選んでね！'); return; }
    if (!selectedMental)   { alert('きもちを選んでね！'); return; }

    const record = {
      date: document.getElementById('record-date').value,
      name: currentMember.name,
      avatar: currentMember.avatar,
      activity: selectedActivity,
      mental: selectedMental,
      note: document.getElementById('record-note').value.trim(),
      savedAt: new Date().toISOString()
    };

    // ローカル保存
    const all = JSON.parse(localStorage.getItem('familyRecords') || '[]');
    all.unshift(record);
    localStorage.setItem('familyRecords', JSON.stringify(all));

    // GAS送信（URL設定時）
    if (GAS_URL) {
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(record)
        });
      } catch(e) {
        console.warn('GAS送信エラー:', e);
      }
    }

    // 完了画面
    const mentalMap = { good: '😊 よかった', normal: '😐 ふつう', bad: '😔 よくなかった' };
    const actMap = { out: '🌤️ 外出した', stay: '🏠 おうちにいた' };
    document.getElementById('done-name').textContent = currentMember.avatar + ' ' + currentMember.name;
    document.getElementById('done-msg').textContent =
      `${actMap[selectedActivity]}　${mentalMap[selectedMental]}\nきろくしたよ！`;
    showScreen('screen-done');
  }

  // Delete one
  function deleteRecord(index) {
    if (!confirm('この記録を削除しますか？')) return;
    const all = JSON.parse(localStorage.getItem('familyRecords') || '[]');
    all.splice(index, 1);
    localStorage.setItem('familyRecords', JSON.stringify(all));
    renderHistory();
  }

  // Toggle select all
  function toggleSelectAll() {
    const checkboxes = document.querySelectorAll('.record-checkbox');
    const allChecked = [...checkboxes].every(c => c.checked);
    checkboxes.forEach(c => {
      c.checked = !allChecked;
      c.closest('.history-item').classList.toggle('selected', !allChecked);
    });
    updateClearBtn();
  }

  // Update clear button state
  function updateClearBtn() {
    const anyChecked = [...document.querySelectorAll('.record-checkbox')].some(c => c.checked);
    document.getElementById('btn-clear-selected').classList.toggle('active', anyChecked);
  }

  // Clear selected
  function clearSelected() {
    const checkboxes = [...document.querySelectorAll('.record-checkbox')];
    const selectedIndices = checkboxes
      .map((c, i) => c.checked ? i : -1)
      .filter(i => i !== -1)
      .reverse(); // 後ろから削除してインデックスずれを防ぐ
    if (!confirm(`${selectedIndices.length}件削除しますか？`)) return;
    const all = JSON.parse(localStorage.getItem('familyRecords') || '[]');
    selectedIndices.forEach(i => all.splice(i, 1));
    localStorage.setItem('familyRecords', JSON.stringify(all));
    renderHistory();
  }

  // History
  async function renderHistory() {
    const container = document.getElementById('history-list');
    const mentalLabel = { good: ['よかった','tag-good'], normal: ['ふつう','tag-normal'], bad: ['よくなかった','tag-bad'] };
    const actLabel = { out: ['外出した','tag-out'], stay: ['おうちにいた','tag-stay'] };

    function buildHTML(all) {
      if (all.length === 0) {
        container.innerHTML = '<div class="empty-msg">まだきろくがないよ</div>';
        return;
      }
      container.innerHTML = all.map((r, i) => {
        const [mText, mClass] = mentalLabel[r.mental] || ['?',''];
        const [aText, aClass] = actLabel[r.activity] || ['?',''];
        const noteHtml = r.note ? `<div class="h-note">💬 ${r.note}</div>` : '';
        return `
          <div class="history-item" id="item-${i}">
            <input type="checkbox" class="record-checkbox" onchange="updateClearBtn(); this.closest('.history-item').classList.toggle('selected', this.checked)">
            <div class="h-av">${r.avatar}</div>
            <div class="h-info">
              <div class="h-name">${r.name}</div>
              <div class="h-date">${r.date}</div>
              <div class="h-tags">
                <span class="h-tag ${aClass}">${aText}</span>
                <span class="h-tag ${mClass}">${mText}</span>
              </div>
              ${noteHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    // GASからデータ取得
    if (GAS_URL) {
      container.innerHTML = '<div class="empty-msg">📡 取得中...</div>';
      try {
        const res = await fetch(GAS_URL, { mode: 'cors' });
        const data = await res.json();
        // 日付の新しい順にソート
        const sorted = data.sort((a, b) =>
          new Date(b.savedAt || b.date) - new Date(a.savedAt || a.date)
        );
        buildHTML(sorted);
        return;
      } catch(e) {
        console.warn('GAS取得失敗、localStorageにフォールバック:', e);
      }
    }

    // フォールバック: localStorage
    const all = JSON.parse(localStorage.getItem('familyRecords') || '[]');
    buildHTML(all);
  }
</script>
</body>
</html>
